name: Publish to PyPI

# Publishes the archsteer CLI to PyPI when you push a version tag (e.g. v0.2.0).
# Bump the version in pyproject.toml and archsteer/__init__.py first, then:
#   git tag v0.2.0 && git push origin v0.2.0
# Requires the repo secret PYPI_API_TOKEN (a PyPI project-scoped API token).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
