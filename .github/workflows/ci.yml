name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Install mcp extra and smoke-test the server
        run: |
          pip install -e ".[mcp]"
          cd examples/demo-repo
          archsteer init && archsteer map
          python -c "
          import archsteer.mcp_server as s
          from pathlib import Path
          s._root = Path('.')
          import json
          print(json.dumps(s.current_architecture()))
          print(json.dumps(s.check_file('src/controllers/payment_controller.js')))
          "
