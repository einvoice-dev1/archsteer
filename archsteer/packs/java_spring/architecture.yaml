version: 1
target: "Layered Spring architecture: controllers stay thin, persistence lives in repositories"

# Baseline layers for a Spring-style service. ArchSteer infers each class's
# layer from its stereotype annotation (@RestController, @Service, @Repository,
# @Entity) first, then from directory names. Adjust to your conventions.
layers:
  - controller
  - service
  - repository
  - model

rules:
  - id: persistence-only-in-repository
    type: required_layer_for_data_access
    description: "JDBC / JPA / raw SQL may only live in the repository layer."
    severity: error
    allowed_layers: [repository, model]
    operations: [RAW]
    adr: .archsteer/adr/0001-repository-pattern.md
    steer: >-
      Do NOT run queries (JdbcTemplate, EntityManager, raw SQL) from controllers
      or services. Add or extend a @Repository class and call it instead.

  - id: controller-must-not-touch-repository
    type: forbidden_layer_edge
    description: "Controllers call services; they never reach past them into repositories."
    severity: error
    from_layer: controller
    to_layer: repository
    adr: .archsteer/adr/0002-thin-controllers.md
    steer: >-
      Controllers must only depend on @Service classes. If a controller needs
      data, add a service method that delegates to the repository.

  - id: model-depends-on-nothing
    type: forbidden_layer_edge
    description: "Entities/domain models must not depend on services."
    severity: warn
    from_layer: model
    to_layer: service
    adr: .archsteer/adr/0002-thin-controllers.md
    steer: >-
      @Entity / domain classes are the innermost layer — they must not import
      services or controllers. Move orchestration logic out of the entity.
